schema_version: 1
tag_family: tag36h11
tag_size: 0.04

# This demo assumes tag 0 is centred on the top face of a 50 mm cube. The tag
# frame +Z axis points away from the printed face, so the cube centre is 25 mm
# along -Z. Re-measure this transform for the physical asset before execution.
objects:
  0:
    class_id: tagged_cube
    object_name: tagged_cube
    confidence: 1.0
    dimensions: [0.05, 0.05, 0.05]
    tag_to_object:
      translation: [0.0, 0.0, -0.025]
      rotation: [0.0, 0.0, 0.0, 1.0]
