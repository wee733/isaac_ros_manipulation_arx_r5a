blackboard_params:
  max_num_next_object: 1
  use_drop_pose_from_rviz: false
  abort_motion: false

  # Recovery pose only. Replace this seed with a pose validated on the real
  # R5A. Format: [x, y, z, qx, qy, qz, qw] in base_link.
  home_pose: [0.30, 0.0, 0.25, 0.0, 0.0, 0.0, 1.0]

  mode: 0
  target_poses: []
  class_ids: []
  selected_object_id: null
  active_obj_id: null
  goal_drop_pose: null
  rviz_drop_pose: null
  object_info_cache: null
  next_object_id: []
  workflow_status: 4
  workflow_summary: ''

  supported_objects:
    tagged_cube:
      class_id: tagged_cube
      grasp_file_path: $(ros2 pkg prefix --share isaac_ros_manipulation_arx_r5a_bringup)/config/grasps/tagged_cube_grasps.yaml
      mesh_file_path: $(ros2 pkg prefix --share isaac_ros_manipulation_arx_r5a_bringup)/meshes/tagged_cube.obj
