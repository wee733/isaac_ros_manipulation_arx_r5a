# ARX-specific parameters consumed by the official Isaac ROS multi-object
# pick-and-place py_trees implementation.
behavior_tree_params:
  multi_object_pick_and_place:
    assign_object_name:
      service_name: assign_name_to_object

    attach_object:
      action_server_name: attach_object
      shape: CUBOID
      scale: [0.05, 0.05, 0.05]
      gripper_frame: link6
      grasp_frame: grasp_frame

    close_gripper:
      gripper_action_name: /gripper_controller/gripper_cmd
      close_position: 0.0
      max_effort: 10.0

    detach_object:
      action_server_name: attach_object

    detect_object:
      action_server_name: /get_objects
      detection_confidence_threshold: 0.5

    execute_trajectory:
      action_server_name: execute_trajectory
      index: 0

    interactive_marker:
      mesh_resource_uri: package://isaac_ros_manipulation_arx_r5a_robot_description/meshes/visual/link6.STL
      reference_frame: base_link
      end_effector_frame: link6
      user_confirmation_timeout: 60.0

    mesh_assigner:
      service_name: add_mesh_to_object

    object_selector:
      action_server_name: /get_selected_object

    open_gripper:
      gripper_action_name: /gripper_controller/gripper_cmd
      open_position: 0.044
      max_effort: 10.0

    plan_to_grasp:
      action_server_name: cumotion/motion_plan
      link_name: base_link
      time_dilation_factor: 0.10
      grasp_approach_offset_distance: [-0.10, 0.0, 0.0]
      grasp_translation_path_deviation_limit: 0.01
      grasp_translation_terminal_deviation_limit: -1.0
      grasp_enable_orientation_path_axis_constraint: true
      grasp_orientation_terminal_deviation_limit: -1.0
      grasp_orientation_path_axis_deviation_limit: -1.0
      retract_offset_distance: [0.0, 0.0, 0.10]
      retract_translation_path_deviation_limit: 0.01
      retract_translation_terminal_deviation_limit: -1.0
      retract_enable_orientation_path_axis_constraint: true
      retract_orientation_terminal_deviation_limit: -1.0
      retract_orientation_path_axis_deviation_limit: -1.0
      grasp_approach_constraint_in_goal_frame: true
      retract_constraint_in_goal_frame: false
      update_planning_scene: true
      world_frame: base_link
      enable_aabb_clearing: true
      esdf_clearing_padding: [0.02, 0.02, 0.02]
      aabb_clearing_shape: CUBOID
      aabb_clearing_shape_scale: [0.05, 0.05, 0.05]

    plan_to_pose:
      action_server_name: cumotion/motion_plan
      link_name: base_link
      time_dilation_factor: 0.10
      update_planning_scene: true
      aabb_clearing_shape: SPHERE
      aabb_clearing_shape_scale: [0.10, 0.10, 0.10]
      enable_aabb_clearing: true
      esdf_clearing_padding: [0.05, 0.05, 0.05]

    pose_estimation:
      action_server_name: /get_object_pose
      base_frame_id: base_link
      camera_frame_id: camera_1_color_optical_frame
      workspace_bounds:
        diagonal:
          - [-0.60, -0.60, -0.05]
          - [0.60, 0.60, 0.80]

    publish_static_planning_scene:
      service_name: publish_static_planning_scene
      scene_file_path: ''

    read_grasp_poses:
      publish_grasp_poses: true

    retry_config:
      max_planning_retries: 5
      max_controller_retries: 2
      max_detection_retries: 3
      max_pose_estimation_retries: 3
      max_gripper_retries: 2
      max_attachment_retries: 3

    server_timeout_config:
      startup_server_timeout_sec: 120.0
      runtime_retry_timeout_sec: 60.0
      server_check_interval_sec: 30.0

    stale_detection:
      timeout_duration: 10.0

    switch_controllers:
      arm:
        controllers_to_activate: [manipulator_controller]
        controllers_to_deactivate: []
        strictness: 4
      tool:
        controllers_to_activate: [gripper_controller]
        controllers_to_deactivate: []
        strictness: 4
